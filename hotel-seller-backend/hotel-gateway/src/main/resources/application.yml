server:
  port: 8080

spring:
  application:
    name: hotel-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # 搜索服务路由
        - id: search-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=0

        # 报价服务路由
        - id: pricing-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/pricing/**
          filters:
            - StripPrefix=0

        # 管理后台服务路由
        - id: admin-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - StripPrefix=0

        # 统计服务路由(走admin-service)
        - id: stats-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/stats/**
          filters:
            - StripPrefix=0

logging:
  level:
    org.springframework.cloud.gateway: info
    com.ceair.hotel: debug
